name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          mkdir -p build
          cp index.html build/index.html
          echo "Build files copied: $(ls -la build/)"

      - name: Validate Build
        run: |
          test -f build/index.html
          SIZE=$(stat -c%s build/index.html)
          if [ "$SIZE" -lt 10 ]; then exit 1; fi
          echo "Build size: $SIZE bytes - OK"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  post-deploy:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Deploy confirmation
        run: |
          echo "✅ Ken Bus Adventure placeholder deployed to GitHub Pages"
